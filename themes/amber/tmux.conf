# tmux colors for amber (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#fc9505 bg=#140b05'
setw -g clock-mode-colour            '#fc9505'
set  -g pane-border-style            'fg=#fc9505'
set  -g pane-active-border-style     'fg=#fc9505'
set  -g message-style                'fg=#140b05 bg=#fc9505 bold'
setw -g mode-style                   'fg=#140b05 bg=#fc9505 bold'
set  -g status-right-style           'fg=#fc9505 bg=#372005'
setw -g window-status-current-style  'fg=#140b05 bg=#fc9505 bold'
setw -g window-status-style          'fg=#fc9505 bg=#372005'
setw -g window-status-bell-style     'fg=#fc9505 bold'
