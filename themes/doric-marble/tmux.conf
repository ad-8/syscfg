# tmux colors for doric-marble (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#202020 bg=#ededed'
setw -g clock-mode-colour            '#603d3a'
set  -g pane-border-style            'fg=#202020'
set  -g pane-active-border-style     'fg=#603d3a'
set  -g message-style                'fg=#ededed bg=#603d3a bold'
setw -g mode-style                   'fg=#ededed bg=#603d3a bold'
set  -g status-right-style           'fg=#603d3a bg=#cecece'
setw -g window-status-current-style  'fg=#ededed bg=#603d3a bold'
setw -g window-status-style          'fg=#202020 bg=#cecece'
setw -g window-status-bell-style     'fg=#603d3a bold'
