# tmux colors for doric-plum (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#e2d7e7 bg=#221832'
setw -g clock-mode-colour            '#c586ba'
set  -g pane-border-style            'fg=#e2d7e7'
set  -g pane-active-border-style     'fg=#c586ba'
set  -g message-style                'fg=#221832 bg=#c586ba bold'
setw -g mode-style                   'fg=#221832 bg=#c586ba bold'
set  -g status-right-style           'fg=#c586ba bg=#3f354d'
setw -g window-status-current-style  'fg=#221832 bg=#c586ba bold'
setw -g window-status-style          'fg=#e2d7e7 bg=#3f354d'
setw -g window-status-bell-style     'fg=#c586ba bold'
