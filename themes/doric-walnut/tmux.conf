# tmux colors for doric-walnut (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#b9d3b0 bg=#153227'
setw -g clock-mode-colour            '#aea084'
set  -g pane-border-style            'fg=#b9d3b0'
set  -g pane-active-border-style     'fg=#aea084'
set  -g message-style                'fg=#153227 bg=#aea084 bold'
setw -g mode-style                   'fg=#153227 bg=#aea084 bold'
set  -g status-right-style           'fg=#aea084 bg=#2e4a3c'
setw -g window-status-current-style  'fg=#153227 bg=#aea084 bold'
setw -g window-status-style          'fg=#b9d3b0 bg=#2e4a3c'
setw -g window-status-bell-style     'fg=#aea084 bold'
