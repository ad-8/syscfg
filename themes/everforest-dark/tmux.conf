# tmux colors for everforest-dark (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#d3c6aa bg=#272e33'
setw -g clock-mode-colour            '#7fbbb3'
set  -g pane-border-style            'fg=#d3c6aa'
set  -g pane-active-border-style     'fg=#7fbbb3'
set  -g message-style                'fg=#2e383c bg=#7fbbb3 bold'
setw -g mode-style                   'fg=#2e383c bg=#7fbbb3 bold'
set  -g status-right-style           'fg=#7fbbb3 bg=#414545'
setw -g window-status-current-style  'fg=#2e383c bg=#7fbbb3 bold'
setw -g window-status-style          'fg=#d3c6aa bg=#414545'
setw -g window-status-bell-style     'fg=#7fbbb3 bold'
