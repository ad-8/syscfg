# tmux colors for flatwhite (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#605a52 bg=#f7f3ee'
setw -g clock-mode-colour            '#6a4dff'
set  -g pane-border-style            'fg=#605a52'
set  -g pane-active-border-style     'fg=#6a4dff'
set  -g message-style                'fg=#f7f3ee bg=#6a4dff bold'
setw -g mode-style                   'fg=#f7f3ee bg=#6a4dff bold'
set  -g status-right-style           'fg=#6a4dff bg=#e0dcd7'
setw -g window-status-current-style  'fg=#f7f3ee bg=#6a4dff bold'
setw -g window-status-style          'fg=#605a52 bg=#e0dcd7'
setw -g window-status-bell-style     'fg=#6a4dff bold'
