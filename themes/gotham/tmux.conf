# tmux colors for gotham (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#99d1ce bg=#0c1014'
setw -g clock-mode-colour            '#245361'
set  -g pane-border-style            'fg=#99d1ce'
set  -g pane-active-border-style     'fg=#245361'
set  -g message-style                'fg=#d3ebe9 bg=#245361 bold'
setw -g mode-style                   'fg=#d3ebe9 bg=#245361 bold'
set  -g status-right-style           'fg=#245361 bg=#212d30'
setw -g window-status-current-style  'fg=#d3ebe9 bg=#245361 bold'
setw -g window-status-style          'fg=#99d1ce bg=#212d30'
setw -g window-status-bell-style     'fg=#245361 bold'
