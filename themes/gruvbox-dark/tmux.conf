# tmux colors for gruvbox-dark (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#ebdbb2 bg=#282828'
setw -g clock-mode-colour            '#fabd2f'
set  -g pane-border-style            'fg=#ebdbb2'
set  -g pane-active-border-style     'fg=#fabd2f'
set  -g message-style                'fg=#282828 bg=#fabd2f bold'
setw -g mode-style                   'fg=#282828 bg=#fabd2f bold'
set  -g status-right-style           'fg=#fabd2f bg=#45433d'
setw -g window-status-current-style  'fg=#282828 bg=#fabd2f bold'
setw -g window-status-style          'fg=#ebdbb2 bg=#45433d'
setw -g window-status-bell-style     'fg=#fabd2f bold'
