# tmux colors for gruvbox-light (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#3c3836 bg=#fbf1c7'
setw -g clock-mode-colour            '#b57614'
set  -g pane-border-style            'fg=#3c3836'
set  -g pane-active-border-style     'fg=#b57614'
set  -g message-style                'fg=#fbf1c7 bg=#b57614 bold'
setw -g mode-style                   'fg=#fbf1c7 bg=#b57614 bold'
set  -g status-right-style           'fg=#b57614 bg=#ded5b1'
setw -g window-status-current-style  'fg=#fbf1c7 bg=#b57614 bold'
setw -g window-status-style          'fg=#3c3836 bg=#ded5b1'
setw -g window-status-bell-style     'fg=#b57614 bold'
