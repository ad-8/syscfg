# tmux colors for hackerman (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#ddf7ff bg=#0b0c16'
setw -g clock-mode-colour            '#82fb9c'
set  -g pane-border-style            'fg=#ddf7ff'
set  -g pane-active-border-style     'fg=#82fb9c'
set  -g message-style                'fg=#0b0c16 bg=#82fb9c bold'
setw -g mode-style                   'fg=#0b0c16 bg=#82fb9c bold'
set  -g status-right-style           'fg=#82fb9c bg=#2b2f39'
setw -g window-status-current-style  'fg=#0b0c16 bg=#82fb9c bold'
setw -g window-status-style          'fg=#ddf7ff bg=#2b2f39'
setw -g window-status-bell-style     'fg=#82fb9c bold'
