# tmux colors for iceberg (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#c6c8d1 bg=#161821'
setw -g clock-mode-colour            '#84a0c6'
set  -g pane-border-style            'fg=#c6c8d1'
set  -g pane-active-border-style     'fg=#84a0c6'
set  -g message-style                'fg=#161821 bg=#84a0c6 bold'
setw -g mode-style                   'fg=#161821 bg=#84a0c6 bold'
set  -g status-right-style           'fg=#84a0c6 bg=#30323b'
setw -g window-status-current-style  'fg=#161821 bg=#84a0c6 bold'
setw -g window-status-style          'fg=#c6c8d1 bg=#30323b'
setw -g window-status-bell-style     'fg=#84a0c6 bold'
