# tmux colors for laserwave (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#ffffff bg=#27212e'
setw -g clock-mode-colour            '#eb64b9'
set  -g pane-border-style            'fg=#ffffff'
set  -g pane-active-border-style     'fg=#eb64b9'
set  -g message-style                'fg=#1b1720 bg=#eb64b9 bold'
setw -g mode-style                   'fg=#1b1720 bg=#eb64b9 bold'
set  -g status-right-style           'fg=#eb64b9 bg=#47424d'
setw -g window-status-current-style  'fg=#1b1720 bg=#eb64b9 bold'
setw -g window-status-style          'fg=#ffffff bg=#47424d'
setw -g window-status-bell-style     'fg=#eb64b9 bold'
