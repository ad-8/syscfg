# tmux colors for lumon (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#d6e2ee bg=#1b2d40'
setw -g clock-mode-colour            '#6fb8e3'
set  -g pane-border-style            'fg=#d6e2ee'
set  -g pane-active-border-style     'fg=#6fb8e3'
set  -g message-style                'fg=#1b2d40 bg=#6fb8e3 bold'
setw -g mode-style                   'fg=#1b2d40 bg=#6fb8e3 bold'
set  -g status-right-style           'fg=#6fb8e3 bg=#37485a'
setw -g window-status-current-style  'fg=#1b2d40 bg=#6fb8e3 bold'
setw -g window-status-style          'fg=#d6e2ee bg=#37485a'
setw -g window-status-bell-style     'fg=#6fb8e3 bold'
