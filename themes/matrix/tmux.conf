# tmux colors for matrix (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#00b25f bg=#000000'
setw -g clock-mode-colour            '#00ff88'
set  -g pane-border-style            'fg=#00b25f'
set  -g pane-active-border-style     'fg=#00ff88'
set  -g message-style                'fg=#000000 bg=#00ff88 bold'
setw -g mode-style                   'fg=#000000 bg=#00ff88 bold'
set  -g status-right-style           'fg=#00ff88 bg=#001b0e'
setw -g window-status-current-style  'fg=#000000 bg=#00ff88 bold'
setw -g window-status-style          'fg=#00b25f bg=#001b0e'
setw -g window-status-bell-style     'fg=#00ff88 bold'
