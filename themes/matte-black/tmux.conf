# tmux colors for matte-black (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#bebebe bg=#121212'
setw -g clock-mode-colour            '#e68e0d'
set  -g pane-border-style            'fg=#bebebe'
set  -g pane-active-border-style     'fg=#e68e0d'
set  -g message-style                'fg=#121212 bg=#e68e0d bold'
setw -g mode-style                   'fg=#121212 bg=#e68e0d bold'
set  -g status-right-style           'fg=#e68e0d bg=#2c2c2c'
setw -g window-status-current-style  'fg=#121212 bg=#e68e0d bold'
setw -g window-status-style          'fg=#bebebe bg=#2c2c2c'
setw -g window-status-bell-style     'fg=#e68e0d bold'
