# tmux colors for nord-light (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#3b4252 bg=#e5e9f0'
setw -g clock-mode-colour            '#3b6ea8'
set  -g pane-border-style            'fg=#3b4252'
set  -g pane-active-border-style     'fg=#3b6ea8'
set  -g message-style                'fg=#e5e9f0 bg=#3b6ea8 bold'
setw -g mode-style                   'fg=#e5e9f0 bg=#3b6ea8 bold'
set  -g status-right-style           'fg=#3b6ea8 bg=#ccd0d8'
setw -g window-status-current-style  'fg=#e5e9f0 bg=#3b6ea8 bold'
setw -g window-status-style          'fg=#3b4252 bg=#ccd0d8'
setw -g window-status-bell-style     'fg=#3b6ea8 bold'
