# tmux colors for nord (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#d8dee9 bg=#2e3440'
setw -g clock-mode-colour            '#81a1c1'
set  -g pane-border-style            'fg=#d8dee9'
set  -g pane-active-border-style     'fg=#81a1c1'
set  -g message-style                'fg=#3b4252 bg=#81a1c1 bold'
setw -g mode-style                   'fg=#3b4252 bg=#81a1c1 bold'
set  -g status-right-style           'fg=#81a1c1 bg=#484e59'
setw -g window-status-current-style  'fg=#3b4252 bg=#81a1c1 bold'
setw -g window-status-style          'fg=#d8dee9 bg=#484e59'
setw -g window-status-bell-style     'fg=#81a1c1 bold'
