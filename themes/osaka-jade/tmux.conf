# tmux colors for osaka-jade (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#c1c497 bg=#111c18'
setw -g clock-mode-colour            '#509475'
set  -g pane-border-style            'fg=#c1c497'
set  -g pane-active-border-style     'fg=#509475'
set  -g message-style                'fg=#111c18 bg=#509475 bold'
setw -g mode-style                   'fg=#111c18 bg=#509475 bold'
set  -g status-right-style           'fg=#509475 bg=#2b352b'
setw -g window-status-current-style  'fg=#111c18 bg=#509475 bold'
setw -g window-status-style          'fg=#c1c497 bg=#2b352b'
setw -g window-status-bell-style     'fg=#509475 bold'
