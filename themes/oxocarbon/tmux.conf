# tmux colors for oxocarbon (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#dde1e6 bg=#161616'
setw -g clock-mode-colour            '#78a9ff'
set  -g pane-border-style            'fg=#dde1e6'
set  -g pane-active-border-style     'fg=#78a9ff'
set  -g message-style                'fg=#161616 bg=#78a9ff bold'
setw -g mode-style                   'fg=#161616 bg=#78a9ff bold'
set  -g status-right-style           'fg=#78a9ff bg=#343435'
setw -g window-status-current-style  'fg=#161616 bg=#78a9ff bold'
setw -g window-status-style          'fg=#dde1e6 bg=#343435'
setw -g window-status-bell-style     'fg=#78a9ff bold'
