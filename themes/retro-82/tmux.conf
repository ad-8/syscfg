# tmux colors for retro-82 (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#f6dcac bg=#00172e'
setw -g clock-mode-colour            '#faa968'
set  -g pane-border-style            'fg=#f6dcac'
set  -g pane-active-border-style     'fg=#faa968'
set  -g message-style                'fg=#00172e bg=#faa968 bold'
setw -g mode-style                   'fg=#00172e bg=#faa968 bold'
set  -g status-right-style           'fg=#faa968 bg=#253541'
setw -g window-status-current-style  'fg=#00172e bg=#faa968 bold'
setw -g window-status-style          'fg=#f6dcac bg=#253541'
setw -g window-status-bell-style     'fg=#faa968 bold'
