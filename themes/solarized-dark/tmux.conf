# tmux colors for solarized-dark (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#839496 bg=#002b36'
setw -g clock-mode-colour            '#b58900'
set  -g pane-border-style            'fg=#839496'
set  -g pane-active-border-style     'fg=#b58900'
set  -g message-style                'fg=#002b36 bg=#b58900 bold'
setw -g mode-style                   'fg=#002b36 bg=#b58900 bold'
set  -g status-right-style           'fg=#b58900 bg=#143b44'
setw -g window-status-current-style  'fg=#002b36 bg=#b58900 bold'
setw -g window-status-style          'fg=#839496 bg=#143b44'
setw -g window-status-bell-style     'fg=#b58900 bold'
