# tmux colors for tokyo-night (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#a9b1d6 bg=#1a1b26'
setw -g clock-mode-colour            '#7aa2f7'
set  -g pane-border-style            'fg=#a9b1d6'
set  -g pane-active-border-style     'fg=#7aa2f7'
set  -g message-style                'fg=#1a1b26 bg=#7aa2f7 bold'
setw -g mode-style                   'fg=#1a1b26 bg=#7aa2f7 bold'
set  -g status-right-style           'fg=#7aa2f7 bg=#2f3240'
setw -g window-status-current-style  'fg=#1a1b26 bg=#7aa2f7 bold'
setw -g window-status-style          'fg=#a9b1d6 bg=#2f3240'
setw -g window-status-bell-style     'fg=#7aa2f7 bold'
