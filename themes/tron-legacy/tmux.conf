# tmux colors for tron-legacy (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#b0ccdc bg=#000000'
setw -g clock-mode-colour            '#8fd4ff'
set  -g pane-border-style            'fg=#b0ccdc'
set  -g pane-active-border-style     'fg=#8fd4ff'
set  -g message-style                'fg=#000000 bg=#8fd4ff bold'
setw -g mode-style                   'fg=#000000 bg=#8fd4ff bold'
set  -g status-right-style           'fg=#8fd4ff bg=#1a1f21'
setw -g window-status-current-style  'fg=#000000 bg=#8fd4ff bold'
setw -g window-status-style          'fg=#b0ccdc bg=#1a1f21'
setw -g window-status-bell-style     'fg=#8fd4ff bold'
