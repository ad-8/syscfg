# tmux colors for vantablack (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#ffffff bg=#000000'
setw -g clock-mode-colour            '#ffffff'
set  -g pane-border-style            'fg=#ffffff'
set  -g pane-active-border-style     'fg=#ffffff'
set  -g message-style                'fg=#000000 bg=#ffffff bold'
setw -g mode-style                   'fg=#000000 bg=#ffffff bold'
set  -g status-right-style           'fg=#ffffff bg=#262626'
setw -g window-status-current-style  'fg=#000000 bg=#ffffff bold'
setw -g window-status-style          'fg=#ffffff bg=#262626'
setw -g window-status-bell-style     'fg=#ffffff bold'
