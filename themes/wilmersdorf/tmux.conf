# tmux colors for wilmersdorf (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#c6c6c6 bg=#282b33'
setw -g clock-mode-colour            '#819cd6'
set  -g pane-border-style            'fg=#c6c6c6'
set  -g pane-active-border-style     'fg=#819cd6'
set  -g message-style                'fg=#1f2024 bg=#819cd6 bold'
setw -g mode-style                   'fg=#1f2024 bg=#819cd6 bold'
set  -g status-right-style           'fg=#819cd6 bg=#404249'
setw -g window-status-current-style  'fg=#1f2024 bg=#819cd6 bold'
setw -g window-status-style          'fg=#c6c6c6 bg=#404249'
setw -g window-status-bell-style     'fg=#819cd6 bold'
