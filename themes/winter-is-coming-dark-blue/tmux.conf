# tmux colors for winter-is-coming-dark-blue (accent from hyprland.lua, fg/bg from foot.theme)
# surface = bg blended 15% toward fg, for the inactive-window panel
set  -g status-style                 'fg=#d6deeb bg=#011627'
setw -g clock-mode-colour            '#219fd5'
set  -g pane-border-style            'fg=#d6deeb'
set  -g pane-active-border-style     'fg=#219fd5'
set  -g message-style                'fg=#122d42 bg=#219fd5 bold'
setw -g mode-style                   'fg=#122d42 bg=#219fd5 bold'
set  -g status-right-style           'fg=#219fd5 bg=#213444'
setw -g window-status-current-style  'fg=#122d42 bg=#219fd5 bold'
setw -g window-status-style          'fg=#d6deeb bg=#213444'
setw -g window-status-bell-style     'fg=#219fd5 bold'
